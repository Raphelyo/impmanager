<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistec Implantação</title>
  <meta name="theme-color" content="#4f46e5">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/style.css?v=2">
</head>
<body x-data="layout" :class="{ 'dark': dark }">

  <!-- Overlay -->
  <div class="sidebar-overlay" :class="{ 'open': sidebarOpen }" @click="sidebarOpen = false"></div>

  <!-- Sidebar -->
  <aside class="sidebar" :class="{ 'open': sidebarOpen }">
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-hdd-stack"></i></div>
      <div>
        <div class="logo-text">Sistec</div>
        <div class="logo-sub">Implantação</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Principal</div>
        <a href="#/" class="sidebar-link" :class="{ 'active': route === '/' }" @click="sidebarOpen = false">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="#/projetos" class="sidebar-link" :class="{ 'active': route === '/projetos' }" @click="sidebarOpen = false">
          <i class="bi bi-building"></i> Projetos
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Configuração</div>
        <a href="#/templates" class="sidebar-link" :class="{ 'active': route === '/templates' }" @click="sidebarOpen = false">
          <i class="bi bi-clipboard-data"></i> Templates
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button @click="toggleDark" class="sidebar-link w-full" style="border:none;background:none;cursor:pointer">
        <i :class="dark ? 'bi bi-sun-fill' : 'bi bi-moon-fill'"></i>
        <span x-text="dark ? 'Modo Claro' : 'Modo Escuro'"></span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="main-header">
      <div class="flex items-center gap-3">
        <button class="mobile-toggle" @click="sidebarOpen = !sidebarOpen">
          <i class="bi bi-list"></i>
        </button>
        <div class="page-title" id="pageTitle">
          <i class="bi bi-speedometer2"></i> Dashboard
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-muted" id="clock"></span>
      </div>
    </header>

    <main class="main-content" id="app">
      <div class="flex items-center justify-center py-20">
        <i class="bi bi-arrow-repeat text-3xl text-primary spin"></i>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toastContainer"></div>

  <script defer src="/js/app.js?v=2"></script>
  <script defer src="/js/dashboard.js?v=2"></script>
  <script defer src="/js/projetos-list.js?v=2"></script>
  <script defer src="/js/projeto.js?v=2"></script>
  <script defer src="/js/analisador.js?v=2"></script>
  <script defer src="/js/treinamentos-dashboard.js?v=2"></script>
  <script defer src="/js/treinamentos-tree.js?v=2"></script>
  <script defer src="/js/treinamentos-task.js?v=2"></script>
  <script defer src="/js/treinamentos-study.js?v=2"></script>
  <script defer src="/js/templates.js?v=2"></script>
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('layout', () => ({
        dark: localStorage.getItem('sistec-dark') === '1',
        sidebarOpen: false,
        route: '/',
        init() {
          this.dark = localStorage.getItem('sistec-dark') === '1';
          if (this.dark) document.documentElement.classList.add('dark');
          this.route = window.location.hash.replace('#', '') || '/';
          window.addEventListener('hashchange', () => {
            this.route = window.location.hash.replace('#', '') || '/';
          });
        },
        toggleDark() {
          this.dark = !this.dark;
          document.documentElement.classList.toggle('dark', this.dark);
          localStorage.setItem('sistec-dark', this.dark ? '1' : '0');
        }
      }));
    });

    document.addEventListener('DOMContentLoaded', () => {
      App.init();

      function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
      }
      updateClock();
      setInterval(updateClock, 10000);
    });
  </script>
</body>
</html>
